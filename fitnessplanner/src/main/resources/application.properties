# Server Configuration
server.port=${PORT:8080}

# MongoDB Configuration - Use environment variable with SSL options
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=fitnessdb

# Add SSL configuration
spring.data.mongodb.ssl=true
spring.data.mongodb.ssl.invalid-host-name-allowed=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging
logging.level.com.fitness.fitnessplanner=INFO
logging.level.org.springframework.security=INFO
logging.level.org.mongodb.driver=WARN

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true