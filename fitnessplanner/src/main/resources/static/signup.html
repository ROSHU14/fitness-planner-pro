<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Fitness Planner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-100 to-pink-100 min-h-screen">
<div class="container mx-auto px-4 py-12">
    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-8">
            <a href="/index.html" class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">
                💪 Fitness Planner Pro
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Create Your Account</h2>

            <div id="alertMessage" class="hidden mb-4 p-3 rounded-lg"></div>

            <form id="signupForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Full Name *</label>
                        <input type="text" id="name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Email Address *</label>
                        <input type="email" id="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Password *</label>
                        <input type="password" id="password" required minlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Age</label>
                        <input type="number" id="age" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Gender</label>
                        <select id="gender" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Height (cm) *</label>
                        <input type="number" id="height" required step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Weight (kg) *</label>
                        <input type="number" id="weight" required step="0.1" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Workout Frequency *</label>
                        <select id="workoutFrequency" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                            <option value="sedentary">Sedentary (Little to no exercise)</option>
                            <option value="moderate">Moderate (Exercise 1-3 times/week)</option>
                            <option value="active">Active (Exercise 4-5 times/week)</option>
                            <option value="very_active">Very Active (Daily intense exercise)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Weight Goal *</label>
                        <select id="weightGoal" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                            <option value="LOSS">🏃‍♂️ Weight Loss (Lose fat)</option>
                            <option value="MAINTAIN">⚖️ Maintain Weight (Stay healthy)</option>
                            <option value="GAIN">💪 Weight Gain / Muscle Building</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="signupBtn"
                        class="mt-8 w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-3 rounded-lg hover:shadow-lg transition transform hover:scale-105">
                    Sign Up
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Already have an account?
                    <a href="/login.html" class="text-purple-600 font-semibold hover:underline">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            age: parseInt(document.getElementById('age').value) || 25,
            gender: document.getElementById('gender').value,
            height: parseFloat(document.getElementById('height').value),
            weight: parseFloat(document.getElementById('weight').value),
            workoutFrequency: document.getElementById('workoutFrequency').value,
            weightGoal: document.getElementById('weightGoal').value
        };

        const signupBtn = document.getElementById('signupBtn');
        const alertDiv = document.getElementById('alertMessage');

        signupBtn.disabled = true;
        signupBtn.textContent = 'Creating account...';
        alertDiv.classList.add('hidden');

        try {
            const response = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (data.success) {
                alertDiv.className = 'mb-4 p-3 rounded-lg bg-green-100 text-green-700';
                alertDiv.textContent = 'Account created successfully! Redirecting to login...';
                alertDiv.classList.remove('hidden');

                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            } else {
                alertDiv.className = 'mb-4 p-3 rounded-lg bg-red-100 text-red-700';
                alertDiv.textContent = data.error || 'Signup failed';
                alertDiv.classList.remove('hidden');
                signupBtn.disabled = false;
                signupBtn.textContent = 'Sign Up';
            }
        } catch (error) {
            alertDiv.className = 'mb-4 p-3 rounded-lg bg-red-100 text-red-700';
            alertDiv.textContent = 'Network error. Please try again.';
            alertDiv.classList.remove('hidden');
            signupBtn.disabled = false;
            signupBtn.textContent = 'Sign Up';
        }
    });
</script>
</body>
</html>
