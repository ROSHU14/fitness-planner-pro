<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fitness Planner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-100 to-pink-100 min-h-screen">
<div class="container mx-auto px-4 py-16">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-8">
            <a href="/index.html" class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">
                💪 Fitness Planner Pro
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Welcome Back</h2>

            <div id="alertMessage" class="hidden mb-4 p-3 rounded-lg"></div>

            <form id="loginForm">
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                    <input type="email" id="email" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Password</label>
                    <input type="password" id="password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition">
                </div>

                <button type="submit" id="loginBtn"
                        class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-3 rounded-lg hover:shadow-lg transition transform hover:scale-105">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Don't have an account?
                    <a href="/signup.html" class="text-purple-600 font-semibold hover:underline">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const alertDiv = document.getElementById('alertMessage');

        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';
        alertDiv.classList.add('hidden');

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('userEmail', data.email);
                alertDiv.className = 'mb-4 p-3 rounded-lg bg-green-100 text-green-700';
                alertDiv.textContent = 'Login successful! Redirecting...';
                alertDiv.classList.remove('hidden');

                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1500);
            } else {
                alertDiv.className = 'mb-4 p-3 rounded-lg bg-red-100 text-red-700';
                alertDiv.textContent = data.error || 'Login failed';
                alertDiv.classList.remove('hidden');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        } catch (error) {
            alertDiv.className = 'mb-4 p-3 rounded-lg bg-red-100 text-red-700';
            alertDiv.textContent = 'Network error. Please try again.';
            alertDiv.classList.remove('hidden');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }
    });
</script>
</body>
</html>
