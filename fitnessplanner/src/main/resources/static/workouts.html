<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workouts - Fitness Planner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900">
<div class="flex h-screen">
    <!-- Sidebar (same as dashboard) -->
    <div class="w-64 bg-white dark:bg-gray-800 shadow-lg fixed h-full overflow-y-auto">
        <div class="p-6 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center space-x-2">
                <span class="text-3xl">💪</span>
                <h1 class="text-xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent">Fitness Planner Pro</h1>
            </div>
        </div>
        <nav class="p-4 space-y-1">
            <a href="/dashboard.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg transition"><i class="fas fa-tachometer-alt w-5"></i><span>Dashboard</span></a>
            <a href="/workouts.html" class="sidebar-item active flex items-center space-x-3 px-4 py-3 rounded-lg transition"><i class="fas fa-dumbbell w-5"></i><span>Workouts</span></a>
            <a href="/nutrition.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg transition"><i class="fas fa-apple-alt w-5"></i><span>Nutrition</span></a>
            <a href="/progress.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg transition"><i class="fas fa-chart-line w-5"></i><span>Progress</span></a>
            <a href="/reports.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg transition"><i class="fas fa-file-alt w-5"></i><span>Reports</span></a>
            <a href="/achievements.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg transition"><i class="fas fa-trophy w-5"></i><span>Achievements</span></a>
            <a href="/settings.html" class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg transition"><i class="fas fa-cog w-5"></i><span>Settings</span></a>
        </nav>
        <div class="absolute bottom-0 w-64 p-4 border-t border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2"><i class="fas fa-user-circle text-2xl text-gray-600 dark:text-gray-400"></i><span id="sidebarUserName" class="text-sm text-gray-700 dark:text-gray-300">User</span></div>
                <button onclick="logout()" class="text-red-500 hover:text-red-600 transition"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <button onclick="toggleDarkMode()" class="mt-3 w-full text-left text-sm text-gray-500 dark:text-gray-400 hover:text-purple-600 transition"><i class="fas fa-moon mr-2"></i> Dark Mode</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="ml-64 flex-1 overflow-y-auto">
        <div class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-10">
            <div class="flex justify-between items-center px-8 py-4">
                <h2 class="text-2xl font-bold text-gray-800 dark:text-white">🏋️ Workouts</h2>
                <span id="userName" class="text-gray-700 dark:text-gray-300 font-medium"></span>
            </div>
        </div>

        <div class="p-8">
            <!-- Quick Log -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-8">
                <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-4">📝 Quick Log Workout</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button onclick="logWorkout('Cardio', 'Running', 30)" class="bg-purple-100 dark:bg-gray-700 text-purple-600 dark:text-purple-400 p-4 rounded-lg">🏃 Running (30 min)</button>
                    <button onclick="logWorkout('Cardio', 'Cycling', 30)" class="bg-purple-100 dark:bg-gray-700 text-purple-600 dark:text-purple-400 p-4 rounded-lg">🚴 Cycling (30 min)</button>
                    <button onclick="logWorkout('Strength', 'Push-ups', 15)" class="bg-purple-100 dark:bg-gray-700 text-purple-600 dark:text-purple-400 p-4 rounded-lg">💪 Push-ups (15 min)</button>
                    <button onclick="logWorkout('Strength', 'Squats', 15)" class="bg-purple-100 dark:bg-gray-700 text-purple-600 dark:text-purple-400 p-4 rounded-lg">🏋️ Squats (15 min)</button>
                </div>
                <div class="mt-4"><button onclick="customLogWorkout()" class="w-full bg-purple-600 text-white py-3 rounded-lg">+ Custom Workout</button></div>
            </div>

            <!-- Exercise Library -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                <div class="bg-gradient-to-r from-purple-600 to-pink-600 p-4"><h3 class="text-xl font-bold text-white">🎬 Exercise Library</h3></div>
                <div class="p-6">
                    <div id="exercisesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <p class="text-gray-500 col-span-full text-center">Loading exercises...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login.html';

    function logout() { localStorage.clear(); window.location.href = '/index.html'; }

    function toggleDarkMode() {
        document.documentElement.classList.toggle('dark');
    }

    const userEmail = localStorage.getItem('userEmail');
    if (userEmail) {
        document.getElementById('userName').textContent = userEmail.split('@')[0];
        document.getElementById('sidebarUserName').textContent = userEmail.split('@')[0];
    }

    async function logWorkout(type, name, duration) {
        try {
            await fetch('/api/workouts/log', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ workoutType: type, exerciseName: name, durationMinutes: duration })
            });
            alert(`${name} logged! 🎉`);
        } catch(e) { alert('Error'); }
    }

    async function customLogWorkout() {
        const type = prompt('Workout type:', 'Cardio');
        if (!type) return;
        const name = prompt('Exercise name:', 'Workout');
        if (!name) return;
        const duration = prompt('Duration (minutes):', '30');
        if (!duration) return;
        await logWorkout(type, name, parseInt(duration));
    }

    async function loadExercises() {
        try {
            const res = await fetch('/api/exercises');
            const data = await res.json();
            const container = document.getElementById('exercisesContainer');
            if (data.success && data.data && data.data.length > 0) {
                let html = '';
                for (let ex of data.data) {
                    html += `<div class="border rounded-lg p-4 bg-white dark:bg-gray-800">
                        <h4 class="font-bold text-purple-600">${ex.name}</h4>
                        <p class="text-sm text-gray-500">${ex.category} | ${ex.equipment}</p>
                        <div class="bg-gray-100 dark:bg-gray-700 rounded-lg my-3">
                            <iframe width="100%" height="180" src="${ex.videoUrl}" frameborder="0" allowfullscreen class="rounded-lg"></iframe>
                        </div>
                        <button onclick="logWorkout('Strength', '${ex.name}', 30)" class="w-full bg-purple-600 text-white py-2 rounded-lg">📝 Log This</button>
                    </div>`;
                }
                container.innerHTML = html;
            } else {
                container.innerHTML = '<p class="text-gray-500">No exercises. Run init first.</p>';
            }
        } catch(e) { console.error(e); }
    }

    loadExercises();
</script>
</body>
</html>
